apiVersion: apps/v1
kind: Deployment
metadata:
  name: awsdemo-deployment
  namespace: default
  labels:
    app: awsdemo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: awsdemo
  template:
    metadata:
      labels:
        app: awsdemo
    spec:
      containers:
      - name: awsdemo
        image: jayanthibliss123-star/awsdemo:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
